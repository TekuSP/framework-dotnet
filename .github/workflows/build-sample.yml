name: Build Sample App and publish

on:
  push:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: build-sample-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write
  contents: read
  actions: write

env:
  DOTNET_VERSION: '10.0.x'
  VERSION_PREFIX: '0.2'
  

jobs:
  build-native:
    name: Build native framework-system rust (${{ matrix.os }} ${{ matrix.platform }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: Windows
            runsOn: windows-latest
            platform: win-x64
            buildOutputPath: framework-system/target/release/framework_dotnet_ffi.dll
          - os: Windows
            runsOn: windows-11-arm
            platform: win-arm64
            buildOutputPath: framework-system/target/release/framework_dotnet_ffi.dll
          - os: Linux
            runsOn: ubuntu-latest
            platform: linux-x64
            buildOutputPath: framework-system/target/release/libframework_dotnet_ffi.so
          - os: Linux
            runsOn: ubuntu-24.04-arm
            platform: linux-arm64
            buildOutputPath: framework-system/target/release/libframework_dotnet_ffi.so

    runs-on: ${{ matrix.runsOn }}
    env:
      FRAMEWORK-SYSTEM_SUBMODULE_SHA:
      
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Capture Rust submodule revision
      shell: ps1
      run: |
        rust_submodule_sha="$(git -C framework-system rev-parse HEAD)"
        echo "FRAMEWORK-SYSTEM_SUBMODULE_SHA=$rust_submodule_sha" >> "$GITHUB_ENV"

    - name: Check Rust native output cache
      id: rust-native-cache-lookup
      uses: actions/cache@v5
      with:
        path: ${{ matrix.buildOutputPath }}
        key: ${{ runner.os }}-${{ runner.arch }}-${{ github.ref_name }}-rust-native-${{ env.FRAMEWORK-SYSTEM_SUBMODULE_SHA }}
        lookup-only: true
        enableCrossOsArchive: true

    - name: Check Rust bindings cache
      if: matrix.platform == 'win-x64'
      id: rust-bindings-cache-lookup
      uses: actions/cache@v5
      with:
        path: framework-system/framework_dotnet_ffi/csharp/NativeMethods.g.cs
        key: win-x64-rust-bindings-${{ github.ref_name }}-${{ env.FRAMEWORK-SYSTEM_SUBMODULE_SHA }}
        lookup-only: true
        enableCrossOsArchive: true

    - name: Setup Rust toolchain
      if: ${{ (steps.rust-native-cache-lookup.outputs.cache-hit != 'true') || (steps.rust-bindings-cache-lookup.outputs.cache-hit != 'true') }}
      run: rustup show

    - name: Cache Rust dependencies
      if: ${{ (steps.rust-native-cache-lookup.outputs.cache-hit != 'true') || (steps.rust-bindings-cache-lookup.outputs.cache-hit != 'true') }}
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-${{ runner.arch }}-${{ github.ref_name }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install Linux Framework dependencies
      if: ${{(runner.os == 'Linux') && ((steps.rust-native-cache-lookup.outputs.cache-hit != 'true') || (steps.rust-bindings-cache-lookup.outputs.cache-hit != 'true')) }}
      run: |
        sudo apt-get update
        sudo apt-get install -y libudev-dev

    - name: Build native library
      if: ${{ (steps.rust-native-cache-lookup.outputs.cache-hit != 'true') || (steps.rust-bindings-cache-lookup.outputs.cache-hit != 'true') }}
      run: cargo build --manifest-path framework-system/Cargo.toml -p framework_dotnet_ffi --release

    - name: Save Rust native output cache
      uses: actions/cache@v5
      if: ${{ (steps.rust-native-cache-lookup.outputs.cache-hit != 'true') || (steps.rust-bindings-cache-lookup.outputs.cache-hit != 'true') }}
      with:
        path: ${{ matrix.buildOutputPath }}
        key: ${{ runner.os }}-${{ runner.arch }}-${{ github.ref_name }}-rust-native-${{ env.FRAMEWORK-SYSTEM_SUBMODULE_SHA }}
        enableCrossOsArchive: true

    - name: Save Rust bindings cache
      if: ${{(matrix.platform == 'win-x64') && ((steps.rust-native-cache-lookup.outputs.cache-hit != 'true') || (steps.rust-bindings-cache-lookup.outputs.cache-hit != 'true')) }}
      uses: actions/cache@v5
      with:
        path: framework-system/framework_dotnet_ffi/csharp/NativeMethods.g.cs
        key: win-x64-rust-bindings-${{ github.ref_name }}-${{ env.FRAMEWORK-SYSTEM_SUBMODULE_SHA }}
        enableCrossOsArchive: true

    - name: "Cancel if failure"
      if: ${{ failure() }}
      uses: potiuk/cancel-workflow-runs@master
      with:
        cancelMode: self
        cancelFutureDuplicates: false
        selfPreservation: false
        token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build library + sample app (${{ matrix.os }} ${{ matrix.platform }})
    needs: build-native
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: Windows
            runsOn: windows-latest
            platform: win-x64
          - os: Windows
            runsOn: windows-11-arm
            platform: win-arm64
          - os: Linux
            runsOn: ubuntu-latest
            platform: linux-x64
          - os: Linux
            runsOn: ubuntu-24.04-arm
            platform: linux-arm64
            
    runs-on: ${{ matrix.runsOn }}
    env:
      FRAMEWORK-SYSTEM_SUBMODULE_SHA:
      
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Capture Rust submodule revision
      shell: ps1
      run: |
        rust_submodule_sha="$(git -C framework-system rev-parse HEAD)"
        echo "FRAMEWORK-SYSTEM_SUBMODULE_SHA=$rust_submodule_sha" >> "$GITHUB_ENV"

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - uses: actions/cache@v5
      name: Cache .NET dependencies
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-${{ runner.arch }}-${{ github.ref_name }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-nuget-

    - name: Restore generated bindings cache
      uses: actions/cache/restore@v4
      with:
        path: framework-system/framework_dotnet_ffi/csharp/NativeMethods.g.cs
        key: win-x64-rust-bindings-${{ github.ref_name }}-${{ env.FRAMEWORK-SYSTEM_SUBMODULE_SHA }}
        fail-on-cache-miss: true
        enableCrossOsArchive: true

    - name: Restore win-x64 native cache
      uses: actions/cache/restore@v4
      with:
        path: artifacts/win-x64/framework_dotnet_ffi.dll
        key: Windows-X64-rust-native-${{ github.ref_name }}-${{ env.FRAMEWORK-SYSTEM_SUBMODULE_SHA }}
        fail-on-cache-miss: true
        enableCrossOsArchive: true

    - name: Restore win-arm64 native cache
      uses: actions/cache/restore@v4
      with:
        path: artifacts/win-arm64/framework_dotnet_ffi.dll
        key: Windows-ARM64-rust-native-${{ github.ref_name }}-${{ env.FRAMEWORK-SYSTEM_SUBMODULE_SHA }}
        fail-on-cache-miss: true
        enableCrossOsArchive: true

    - name: Restore linux-x64 native cache
      uses: actions/cache/restore@v4
      with:
        path: artifacts/linux-x64/libframework_dotnet_ffi.so
        key: Linux-X64-rust-native-${{ github.ref_name }}-${{ env.FRAMEWORK-SYSTEM_SUBMODULE_SHA }}
        fail-on-cache-miss: true
        enableCrossOsArchive: true

    - name: Restore linux-arm64 native cache
      uses: actions/cache/restore@v4
      with:
        path: artifacts/linux-arm64/libframework_dotnet_ffi.so
        key: Linux-ARM64-rust-native-${{ github.ref_name }}-${{ env.FRAMEWORK-SYSTEM_SUBMODULE_SHA }}
        fail-on-cache-miss: true
        enableCrossOsArchive: true

    - name: Restore dependencies for library
      run: dotnet restore -v normal -p:Version=${{ env.VERSION_PREFIX }}.${{ github.run_number }} -p:InformationalVersion=${{ env.VERSION_PREFIX }}.${{ github.run_number }}+${{ github.sha }} -p:DebugSymbols=true -p:DebugType=portable

    - name: Restore dependencies for sample app
      run: dotnet restore framework-dotnet-cli-test/framework-dotnet-cli-test.csproj -v normal -p:Version=${{ env.VERSION_PREFIX }}.${{ github.run_number }} -p:InformationalVersion=${{ env.VERSION_PREFIX }}.${{ github.run_number }}+${{ github.sha }} -p:DebugSymbols=true -p:DebugType=portable

    - name: Build library
      run: >-
        dotnet build framework-dotnet/framework-dotnet.csproj
        -v normal
        --configuration Release
        --no-restore
        -p:Version=${{ env.VERSION_PREFIX }}.${{ github.run_number }}
        -p:InformationalVersion=${{ env.VERSION_PREFIX }}.${{ github.run_number }}+${{ github.sha }}
        -p:DebugSymbols=true
        -p:DebugType=portable
        -p:ContinuousIntegrationBuild=true
        -p:SkipRustBuild=true
        -p:FrameworkDotnetWindowsNativeLibraryPath=${{ github.workspace }}/artifacts/win-x64/framework_dotnet_ffi.dll
        -p:FrameworkDotnetWindowsArm64NativeLibraryPath=${{ github.workspace }}/artifacts/win-arm64/framework_dotnet_ffi.dll
        -p:FrameworkDotnetLinuxNativeLibraryPath=${{ github.workspace }}/artifacts/linux-x64/libframework_dotnet_ffi.so
        -p:FrameworkDotnetLinuxArm64NativeLibraryPath=${{ github.workspace }}/artifacts/linux-arm64/libframework_dotnet_ffi.so
        
    - name: Build sample app
      run: >-
        dotnet build framework-dotnet-cli-test/framework-dotnet-cli-test.csproj
        -v normal
        --configuration Release
        --no-restore
        -p:Version=${{ env.VERSION_PREFIX }}.${{ github.run_number }}
        -p:InformationalVersion=${{ env.VERSION_PREFIX }}.${{ github.run_number }}+${{ github.sha }}
        -p:DebugSymbols=true
        -p:DebugType=portable
        -p:ContinuousIntegrationBuild=true
        -p:SkipRustBuild=true
        
    - name: Publish sample app
      run: >-
        dotnet publish framework-dotnet-cli-test/framework-dotnet-cli-test.csproj
        -v normal
        --configuration Release
        --no-restore
        --no-build
        --output ${{ github.workspace }}/artifacts/sample-app/${{ matrix.platform }}
        -p:Version=${{ env.VERSION_PREFIX }}.${{ github.run_number }}
        -p:InformationalVersion=${{ env.VERSION_PREFIX }}.${{ github.run_number }}+${{ github.sha }}
        -p:DebugSymbols=true
        -p:DebugType=portable
        -p:ContinuousIntegrationBuild=true
        -p:SkipRustBuild=true

    - name: Upload sample app artifact
      uses: actions/upload-artifact@v7
      with:
        name: framework-dotnet-sample-app-${{ matrix.platform }}
        path: ${{ github.workspace }}/artifacts/sample-app/${{ matrix.platform }}
        if-no-files-found: error
        retention-days: 90
